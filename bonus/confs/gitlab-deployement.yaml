global:
  edition: ce

  hosts:
    domain: gitlab.local
    externalIP: 172.18.0.2
    externalUrl: "https://gitlab.local"

  ingress:
    enabled: false
    configureCertmanager: false

gitlab:  
  webservice:
    replicas: 1
  sidekiq:
    replicas: 1
  gitlab-shell:
    replicas: 1
    service:
      type: NodePort
      nodePort: 31212

gitlab-runner:
  install: false

shell:
  port: 31212

registry:
  hpa:
    replicas: 1  

nginx-ingress:
  enabled: false

certmanager:
  install: false

prometheus:
  install: false

rails:
  bootsnap:
    enabled: false